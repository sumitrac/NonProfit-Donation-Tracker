spring.application.name=nonprofit-donation-tracker
# Port
server.port=${PORT:8080}
# Database (with your local settings as the "Plan B" fallback)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/nonprofit_donation_tracker}
spring.datasource.username=${DB_USER:sumitrac}
spring.datasource.password=${DB_PASS:}
# Standard settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false